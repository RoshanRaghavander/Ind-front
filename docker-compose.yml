services:
  frontend:
    build:
      context: .
      args:
        - PUBLIC_GROWTH_ENDPOINT=${PUBLIC_GROWTH_ENDPOINT}
    container_name: frontend_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLIC_GROWTH_ENDPOINT=${PUBLIC_GROWTH_ENDPOINT}
      # adapter-node: correct URLs behind Traefik/Caddy/nginx (Dokploy, Coolify, etc.)
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
    restart: unless-stopped
    env_file:
      - .env
